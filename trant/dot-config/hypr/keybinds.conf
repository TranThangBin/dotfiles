$hyprpickerLockFile=/tmp/hyprpicker.lock
$hyprshotLockFile=/tmp/hyprshot.lock
$hyprshotScreenshotDir=$HOME/Pictures/Screenshots
$hyprshotNotificationTimeout=5000

$terminal=uwsm-app -T
$fileExplorer=rofi -config wayland-config.rasi -show filebrowser
$launcher=rofi -config wayland-config.rasi -show
$logoutMenu=$HOME/.config/rofi/scripts/powermenu.sh
$colorPicker=flock -n $hyprpickerLockFile -c hyprpicker
$emojiPicker=rofi -show emoji -emoji-mode
$clipboardPicker=cliphist list | rofi -dmenu -p "Copy Clipboard Entry" | cliphist decode | wl-copy
$clipboardDelete=cliphist list | rofi -dmenu -p "Delete Clipboard Entry" | cliphist delete
$clipboardWipe=[ "$(printf 'no\nyes' | rofi -dmenu -p 'Wipe Clipboard')" = 'yes' ] && cliphist wipe
$screenshotRegion=flock -n $hyprshotLockFile -c "hyprshot -z -m region -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$screenshotWindow=flock -n $hyprshotLockFile -c "hyprshot -z -m window -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$screenshotOutput=flock -n $hyprshotLockFile -c "hyprshot -z -m output -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$clipboardScreenshotRegion=flock -n $hyprshotLockFile -c "hyprshot -z -m region -t $hyprshotNotificationTimeout --clipboard-only"
$clipboardScreenshotWindow=flock -n $hyprshotLockFile -c "hyprshot -z -m window -t $hyprshotNotificationTimeout --clipboard-only"
$clipboardScreenshotOutput=flock -n $hyprshotLockFile -c "hyprshot -z -m output -t $hyprshotNotificationTimeout --clipboard-only"
$toggleStatusBar=killall -SIGUSR1 waybar
$refreshStatusBar=killall -SIGUSR2 waybar

bind=SUPER, Return, exec, $terminal
bind=SUPER, E, exec, $fileExplorer
bind=SUPER, Space, exec, $launcher
bind=SUPER SHIFT, E, exec, $logoutMenu
bind=SUPER, C, exec, $colorPicker
bind=SUPER SHIFT, Space, exec, $emojiPicker
bind=SUPER, V, exec, $clipboardPicker
bind=SUPER SHIFT, V, exec, $clipboardDelete
bind=SUPER CTRL SHIFT, V, execr, $clipboardWipe
bind=SUPER, PRINT, exec, $screenshotRegion
bind=SUPER SHIFT, PRINT, exec, $screenshotWindow
bind=SUPER CTRL SHIFT, PRINT, exec, $screenshotOutput
bind=,PRINT, exec, $clipboardScreenshotRegion
bind=SHIFT, PRINT, exec, $clipboardScreenshotWindow
bind=CTRL SHIFT, PRINT, exec, $clipboardScreenshotOutput
bind=SUPER, B, exec, $toggleStatusBar
bind=SUPER SHIFT, B, exec, $refreshStatusBar

bind=SUPER, F, fullscreen,
bind=SUPER, P, pseudo,
bind=SUPER SHIFT, F, togglefloating,
bind=SUPER SHIFT, Q, killactive,
bind=SUPER CTRL SHIFT, J, layoutmsg, togglesplit
bind=SUPER, L, movefocus, r
bind=SUPER, H, movefocus, l
bind=SUPER, K, movefocus, u
bind=SUPER, J, movefocus, d
bind=SUPER SHIFT, L, movewindow, r
bind=SUPER SHIFT, H, movewindow, l
bind=SUPER SHIFT, K, movewindow, u
bind=SUPER SHIFT, J, movewindow, d

binde=SUPER CTRL, L, resizeactive, 10 0
binde=SUPER CTRL, H, resizeactive, -10 0
binde=SUPER CTRL, K, resizeactive, 0 -10
binde=SUPER CTRL, J, resizeactive, 0 10

bind=SUPER, 1, workspace, 1
bind=SUPER, 2, workspace, 2
bind=SUPER, 3, workspace, 3
bind=SUPER, 4, workspace, 4
bind=SUPER, 5, workspace, 5
bind=SUPER, 6, workspace, 6
bind=SUPER, 7, workspace, 7
bind=SUPER, 8, workspace, 8
bind=SUPER, 9, workspace, 9
bind=SUPER, 0, workspace, 10
bind=SUPER, bracketright, workspace, e+1
bind=SUPER, bracketleft, workspace, e-1
bind=SUPER, tab, cyclenext,
bind=SUPER SHIFT, 1, movetoworkspace, 1
bind=SUPER SHIFT, 2, movetoworkspace, 2
bind=SUPER SHIFT, 3, movetoworkspace, 3
bind=SUPER SHIFT, 4, movetoworkspace, 4
bind=SUPER SHIFT, 5, movetoworkspace, 5
bind=SUPER SHIFT, 6, movetoworkspace, 6
bind=SUPER SHIFT, 7, movetoworkspace, 7
bind=SUPER SHIFT, 8, movetoworkspace, 8
bind=SUPER SHIFT, 9, movetoworkspace, 9
bind=SUPER SHIFT, 0, movetoworkspace, 10
bind=SUPER SHIFT, bracketright, movetoworkspace, e+1
bind=SUPER SHIFT, bracketleft, movetoworkspace, e-1
bind=SUPER SHIFT, tab, cyclenext, prev

bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_SINK@ 5%+
bindel=, XF86AudioLowerVolume, exec, wpctl set-volume -l 0.0 @DEFAULT_SINK@ 5%-
bindel=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindel=, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindel=, XF86MonBrightnessUp, exec, brightnessctl --device "*" set 5%+
bindel=, XF86MonBrightnessDown, exec, brightnessctl --device "*" set 5%-

bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPrev, exec, playerctl previous

bindm=SUPER SHIFT, mouse:272, movewindow
bindm=SUPER SHIFT, mouse:273, resizewindow

# bindc=Caps_Lock, Caps_Lock, exec, swayosd-client --caps-lock
# bindc=Mod2, Num_Lock, exec, swayosd-client --num-lock

# plugin: xtra-dispatcher
# hyprlang noerror true
bind=SUPER, D, plugin:xtd:throwunfocused, special:stash
bind=SUPER SHIFT, D, plugin:xtd:bringallfrom, special:stash
bind=SUPER SHIFT, C, plugin:xtd:closeunfocused,
# hyprlang noerror false
