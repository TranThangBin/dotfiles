plugin {
    hyprscrolling {
        column_width=0.9
        explicit_column_widths=0.4, 0.6, 0.9, 1.0
        fullscreen_on_one_column=true
    }
}

unbind=SUPER, L
unbind=SUPER, H
unbind=SUPER, K
unbind=SUPER, J
unbind=SUPER SHIFT, L
unbind=SUPER SHIFT, H
unbind=SUPER SHIFT, K
unbind=SUPER SHIFT, J

unbind=SUPER CTRL, L
unbind=SUPER CTRL, H
unbind=SUPER CTRL, K
unbind=SUPER CTRL, J

bind=SUPER, L, layoutmsg, focus r
bind=SUPER, H, layoutmsg, focus l
bind=SUPER, K, layoutmsg, focus u
bind=SUPER, J, layoutmsg, focus d
bind=SUPER SHIFT, L, layoutmsg, movewindowto r
bind=SUPER SHIFT, H, layoutmsg, movewindowto l
bind=SUPER SHIFT, K, layoutmsg, movewindowto u
bind=SUPER SHIFT, J, layoutmsg, movewindowto d

binde=SUPER CTRL, L, layoutmsg, colresize +conf
binde=SUPER CTRL, H, layoutmsg, colresize -conf

bind=SUPER ALT, F, layoutmsg, togglefit
bind=SUPER ALT, L, layoutmsg, swapcol r
bind=SUPER ALT, H, layoutmsg, swapcol l
