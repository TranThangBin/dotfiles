[trantbox-desktop]
home=$DISTROBOX_HOME/trantbox-desktop
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# dependencies
additional_packages=libnotify wl-clipboard
# host integration
volume=$DOTFILES_DIR/trant/dot-config/fish:$DISTROBOX_HOME/trantbox-desktop/.config/fish:ro
# main
additional_packages=firefox helvum obs-studio nvidia-settings btop gimp shotcut discord
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm webcord-bin brave-bin tor-browser-bin teams
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm pwvucontrol hyprsysteminfo bottles
exported_apps=firefox helvum obs nvidia-settings btop gimp shotcut discord
exported_apps=webcord brave tor-browser teams pwvucontrol hyprsysteminfo bottles
volume=$DOTFILES_DIR/trantbox/trantbox-desktop/dot-config/WebCord/Themes:$DISTROBOX_HOME/trantbox-desktop/.config/WebCord/Themes:ro
volume=$DOTFILES_DIR/trantbox/trantbox-desktop/dot-config/btop:$DISTROBOX_HOME/trantbox-desktop/.config/btop:ro

init_hooks=touch /etc/init

[trantbox-games]
home=$DISTROBOX_HOME/trantbox-games
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# dependencies
additional_packages=openal pipewire pipewire-pulse pipewire-alsa pipewire-jack wireplumber
# host integration
volume=$DOTFILES_DIR/trant/dot-config/fish:$DISTROBOX_HOME/trantbox-games/.config/fish:ro
;    volume=/extra/$USER/.local/share/Steam:$DISTROBOX_HOME/trantbox-games/.local/share/Steam:rw
;    volume=/extra/$USER/Games:$DISTROBOX_HOME/trantbox-games/Games:rw
# main
additional_packages=steam umu-launcher
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm legacy-launcher
exported_apps=steam legacy-launcher
volume=$DOTFILES_DIR/trantbox/trantbox-games/dot-local/share/Steam/steam_dev.cfg:$DISTROBOX_HOME/trantbox-games/.local/share/Steam/steam_dev.cfg:ro

init_hooks=touch /etc/init

[trantbox-dev]
home=$DISTROBOX_HOME/trantbox-dev
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# host integration
volume=$DOTFILES_DIR/trant/dot-config/fish:$DISTROBOX_HOME/trantbox-dev/.config/fish:ro
;    volume=/extra/$USER/Unity:$DISTROBOX_HOME/trantbox-dev/Unity:rw
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/stow
# essential
additional_packages=wl-clipboard
# general
additional_packages=gcc make which git fzf nodejs npm neovim neovide zellij
additional_packages=python3 tree-sitter-cli dotnet-sdk luarocks
exported_apps=neovide
exported_bins=/usr/bin/nvim /usr/bin/zellij /usr/bin/fzf
volume=$DOTFILES_DIR/trantbox/trantbox-dev/dot-config/nvim:$DISTROBOX_HOME/trantbox-dev/.config/nvim:rw
volume=$DOTFILES_DIR/trantbox/trantbox-dev/dot-config/zellij:$DISTROBOX_HOME/trantbox-dev/.config/zellij:rw
volume=$HOME/.ssh:$DISTROBOX_HOME/trantbox-dev/.ssh:ro
volume=$HOME/.config/git:$DISTROBOX_HOME/trantbox-dev/.config/git:ro
# gamedev
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm godot-beta-bin unityhub rider
init_hooks=[ -d $DISTROBOX_HOME/trantbox-dev/.local/share/unity3d ] || mkdir -p $DISTROBOX_HOME/trantbox-dev/.local/share/unity3d
exported_apps=godot-beta unityhub rider
volume=$DOTFILES_DIR/trantbox/trantbox-dev/dot-local/share/unity3d/.gitkeep:$DISTROBOX_HOME/trantbox-dev/.local/share/unity3d/.gitkeep

init_hooks=touch /etc/init

[trantbox-services]
home=$DISTROBOX_HOME/trantbox-services
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
start_now=true

# host integration
volume=$DOTFILES_DIR/trant/dot-config/fish:$DISTROBOX_HOME/trantbox-desktop/.config/fish:ro
# general
additional_packages=profile-sync-daemon fcitx5 fcitx5-unikey fcitx5-configtool playerctl
init_hooks=cp /usr/share/psd/contrib/brave /usr/share/psd/browsers/brave
exported_apps=fcitx5-configtool
exported_bins=/usr/bin/fcitx5 /usr/bin/playerctld
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-local/share/fcitx5/themes:$DISTROBOX_HOME/trantbox-services/.local/share/fcitx5/themes:ro
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/fcitx5:$DISTROBOX_HOME/trantbox-services/.config/fcitx5:rw
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/psd:$DISTROBOX_HOME/trantbox-services/.config/psd:ro
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/waybar:$DISTROBOX_HOME/trantbox-services/.config/waybar:ro
volume=$DISTROBOX_HOME/trantbox-desktop/.mozilla:$DISTROBOX_HOME/trantbox-services/.mozilla:rw
volume=$DISTROBOX_HOME/trantbox-desktop/.config/BraveSoftware:$DISTROBOX_HOME/trantbox-services/.config/BraveSoftware:rw
# wayland
additional_packages=swaync waybar cliphist wl-clipboard
exported_bins=/usr/bin/wl-copy /usr/bin/wl-paste /usr/bin/cliphist
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/swaync:$DISTROBOX_HOME/trantbox-services/.config/swaync:ro
# hyprland
additional_packages=hyprpaper hyprsunset
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/hypr:$DISTROBOX_HOME/trantbox-services/.config/hypr:ro
# X11
additional_packages=picom feh
exported_bins=/usr/bin/picom /usr/bin/feh
volume=$DOTFILES_DIR/trantbox/trantbox-services/dot-config/picom:$DISTROBOX_HOME/trantbox-services/.config/picom:ro

[trantbox-utils]
home=$DISTROBOX_HOME/trantbox-utils
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
start_now=true

# host integration
volume=$DOTFILES_DIR/trant/dot-config/fish:$DISTROBOX_HOME/trantbox-utils/.config/fish:ro
# essential
additional_packages=ripgrep fd fastfetch zoxide brightnessctl catimg unzip bat libnotify unrar
exported_bins=/usr/bin/rg /usr/bin/fd /usr/bin/fastfetch /usr/bin/zoxide
exported_bins=/usr/bin/catimg /usr/bin/unzip /usr/bin/notify-send /usr/bin/unrar /usr/bin/wtype /usr/bin/bat
volume=$DOTFILES_DIR/trantbox/trantbox-utils/dot-config/fastfetch:$DISTROBOX_HOME/trantbox-utils/.config/fastfetch:ro
# wayland
additional_packages=wtype
# hyprland
additional_packages=hyprshot hyprpicker
exported_bins=/usr/bin/hyprshot /usr/bin/hyprpicker
