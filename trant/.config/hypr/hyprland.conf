source = ~/.config/hypr/hyprcat.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf

animations {
  animation=workspaces, 1, 8, default, fade
  enabled=true
}

decoration {
  blur {
    enabled=true
    passes=1
    size=3
    vibrancy=0.169600
  }

  shadow {
    color=$surface0
    color_inactive=$surface0Alpha
  }
  active_opacity=1.000000
  inactive_opacity=0.900000
  rounding=5
}

general {
  allow_tearing=false
  border_size=2
  col.active_border=$pink
  col.inactive_border=$surface0Alpha
  col.nogroup_border=$surface0
  col.nogroup_border_active=$flamingoAlpha
  gaps_in=5
  gaps_out=5
  resize_on_border=false
}

gestures {
  workspace_swipe=false
}

input {
  touchpad {
    natural_scroll=false
  }
  follow_mouse=1
  kb_layout=us
  sensitivity=2
}

master {
  new_status=master
}

misc {
  disable_hyprland_logo=true
  force_default_wallpaper=-1
}
