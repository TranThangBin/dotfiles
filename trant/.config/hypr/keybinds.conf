$mainMod=SUPER
$terminal=uwsm-app -T

$resourceMonitor=uwsm-app -T -- distrobox-enter --name trantbox-desktop -- /usr/bin/btop
$fileExplorer=uwsm-app -T -- distrobox-enter --name trantbox-desktop -- /usr/bin/yazi

$launcher=rofi -show
$logoutMenu=rofi -show power-menu
$colorPicker=distrobox-enter --name trantbox-desktop -- /usr/bin/hyprpicker
$emojiPicker=rofi -show emoji

$cliphist=distrobox-enter --name trantbox-services -- /usr/bin/cliphist
$wl_copy=distrobox-enter --name trantbox-services -- /usr/bin/wl-copy
$clipboardPicker=$cliphist list | rofi -dmenu -p "Copy Clipboard Entry" | $cliphist decode | $wl_copy
$clipboardDelete=$cliphist list | rofi -dmenu -p "Delete Clipboard Entry" | $cliphist delete
$clipboardWipe=[ "$(printf 'no\nyes' | rofi -dmenu -p 'Wipe Clipboard')" = 'yes' ] && $cliphist wipe

$hyprshot=distrobox-enter --name trantbox-desktop -- /usr/bin/hyprshot
$hyprshotLockFile=/tmp/hyprshot.lock
$screenshotRegion=flock -n $hyprshotLockFile -c "$hyprshot -z -m region"
$screenshotWindow=flock -n $hyprshotLockFile -c "$hyprshot -z -m window"
$screenshotOutput=flock -n $hyprshotLockFile -c "$hyprshot -z -m output"
$clipboardScreenshotRegion=flock -n $hyprshotLockFile -c "$hyprshot -z -m region --clipboard-only"
$clipboardScreenshotWindow=flock -n $hyprshotLockFile -c "$hyprshot -z -m window --clipboard-only"
$clipboardScreenshotOutput=flock -n $hyprshotLockFile -c "$hyprshot -z -m output --clipboard-only"

$toggleStatusBar=killall -SIGUSR1 waybar
$refreshStatusBar=killall -SIGUSR2 waybar

bind=$mainMod, Return, exec, $terminal
bind=$mainMod, R, exec, $resourceMonitor
bind=$mainMod, E, exec, $fileExplorer
bind=$mainMod, Space, exec, $launcher
bind=$mainMod SHIFT, E, exec, $logoutMenu
bind=$mainMod, C, exec, $colorPicker
bind=$mainMod SHIFT, Space, exec, $emojiPicker
bind=$mainMod, V, exec, $clipboardPicker
bind=$mainMod SHIFT, V, exec, $clipboardDelete
bind=$mainMod CTRL SHIFT, V, execr, $clipboardWipe
bind=$mainMod, PRINT, exec, $screenshotRegion
bind=$mainMod SHIFT, PRINT, exec, $screenshotWindow
bind=$mainMod CTRL SHIFT, PRINT, exec, $screenshotOutput
bind=,PRINT, exec, $clipboardScreenshotRegion
bind=SHIFT, PRINT, exec, $clipboardScreenshotWindow
bind=CTRL SHIFT, PRINT, exec, $clipboardScreenshotOutput
bind=$mainMod, code:23, exec, $toggleStatusBar
bind=$mainMod SHIFT, code:23, exec, $refreshStatusBar
bind=$mainMod SHIFT, Q, killactive,
bind=$mainMod, F, fullscreen,
bind=$mainMod SHIFT, F, togglefloating,
bind=$mainMod, P, pseudo,
bind=$mainMod CTRL SHIFT, J, togglesplit,
bind=$mainMod, M, togglespecialworkspace, magic
bind=$mainMod SHIFT, M, movetoworkspace, special:magic
bind=$mainMod, L, movefocus, r
bind=$mainMod SHIFT, L, movewindow, r
bind=$mainMod, H, movefocus, l
bind=$mainMod SHIFT, H, movewindow, l
bind=$mainMod, K, movefocus, u
bind=$mainMod SHIFT, K, movewindow, u
bind=$mainMod, J, movefocus, d
bind=$mainMod SHIFT, J, movewindow, d
bind=$mainMod CTRL, L, workspace, e+1
bind=$mainMod CTRL SHIFT, L, movetoworkspace, e+1
bind=$mainMod CTRL, H, workspace, e-1
bind=$mainMod CTRL SHIFT, H, movetoworkspace, e-1

bind=$mainMod, 1, workspace, 1
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod, 5, workspace, 5
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod, 6, workspace, 6
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod, 7, workspace, 7
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod, 8, workspace, 8
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod, 9, workspace, 9
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod, 0, workspace, 10
bind=$mainMod SHIFT, 0, movetoworkspace, 10

bindc=Caps_Lock, Caps_Lock, exec, swayosd-client --caps-lock
bindc=Mod2, Num_Lock, exec, swayosd-client --num-lock

binde=$mainMod CTRL, L, resizeactive, 10 0
binde=$mainMod CTRL, H, resizeactive, -10 0
binde=$mainMod CTRL, K, resizeactive, 0 -10
binde=$mainMod CTRL, J, resizeactive, 0 10

bindel=, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel=, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel=, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel=, XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel=, XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel=, XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl=, XF86AudioNext, exec, swayosd-client --playerctl next
bindl=, XF86AudioPause, exec,swayosd-client --playerctl play-pause
bindl=, XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl=, XF86AudioPrev, exec,swayosd-client --playerctl previous

bindm=$mainMod SHIFT, mouse:272, movewindow
bindm=$mainMod SHIFT, mouse:273, resizewindow
