$hdmiMonitor=HDMI-A-1

monitor=,preferred,auto,1
monitor=$hdmiMonitor,preferred,auto,1

workspace=6,  monitor:$hdmiMonitor, default:true
workspace=7,  monitor:$hdmiMonitor, default:true
workspace=8,  monitor:$hdmiMonitor, default:true
workspace=9,  monitor:$hdmiMonitor, default:true
workspace=10, monitor:$hdmiMonitor, default:true

windowrule=suppress_event maximize, match:class .*
windowrule=no_focus on, match:class ^$, match:title ^$,match:xwayland true, match:float true, match:fullscreen false, match:pin false

# Generic rule for all Unity popup windows
windowrule=stay_focused on, match:class ^(Unity)$, match:float true, match:title ^(UnityEditor\..*)$
windowrule=pin on, match:class ^(Unity)$, match:title ^(UnityEditor\..*)$
# For Unity Colors
windowrule=float on, match:class ^(Unity)$, match:title ^(.*Color)$
windowrule=center on, match:class ^(Unity)$, match:title ^(.*Color)$
windowrule=stay_focused on, match:class ^(Unity)$, match:title ^(.*Color)$
windowrule=pin on, match:class ^(Unity)$, match:title ^(.*Color)$
windowrule=min_size 1 1, match:class ^(Unity)$, match:title ^(.*Color)$
windowrule=no_blur on, match:class ^(Unity)$, match:title ^(.*Color)$

windowrule=no_blur on, match:title ilgwg_desktop_gremlins.py
windowrule=no_shadow on, match:title ilgwg_desktop_gremlins.py
windowrule=border_size 0, match:title ilgwg_desktop_gremlins.py
windowrule=opacity 1 override, match:title ilgwg_desktop_gremlins.py
