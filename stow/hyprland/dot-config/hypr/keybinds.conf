bind=SUPER, Return, exec, t_controller terminal
bind=SUPER, E, exec, t_controller file_explorer
bind=SUPER, Space, exec, t_controller launcher
bind=SUPER SHIFT, E, exec, t_controller powermenu
bind=SUPER, C, exec, t_controller color_picker
bind=SUPER, S, exec, t_controller emoji_picker
bind=SUPER, V, exec, t_controller clipboard_picker pick
bind=SUPER SHIFT, V, exec, t_controller clipboard_picker delete
bind=SUPER CTRL SHIFT, V, exec, t_controller clipboard_picker wipe
bind=SUPER, PRINT, exec, t_controller screenshot save region
bind=SUPER SHIFT, PRINT, exec, t_controller screenshot save window
bind=SUPER CTRL SHIFT, PRINT, exec, t_controller screenshot save output
bind=,PRINT, exec, t_controller screenshot clipboard region
bind=SHIFT, PRINT, exec, t_controller screenshot clipboard window
bind=CTRL SHIFT, PRINT, exec, t_controller screenshot clipboard output
bind=SUPER, B, exec, t_controller status_bar toggle
bind=SUPER SHIFT, B, exec, t_controller status_bar refresh

bind=SUPER, F, fullscreen,
bind=SUPER SHIFT, F, togglefloating,
bind=SUPER SHIFT, Q, killactive,
bind=SUPER CTRL SHIFT, J, layoutmsg, togglesplit
bind=SUPER, L, movefocus, r
bind=SUPER, H, movefocus, l
bind=SUPER, K, movefocus, u
bind=SUPER, J, movefocus, d
bind=SUPER SHIFT, L, movewindow, r
bind=SUPER SHIFT, H, movewindow, l
bind=SUPER SHIFT, K, movewindow, u
bind=SUPER SHIFT, J, movewindow, d

binde=SUPER CTRL, L, resizeactive, 10 0
binde=SUPER CTRL, H, resizeactive, -10 0
binde=SUPER CTRL, K, resizeactive, 0 -10
binde=SUPER CTRL, J, resizeactive, 0 10

bind=SUPER, 1, workspace, 1
bind=SUPER, 2, workspace, 2
bind=SUPER, 3, workspace, 3
bind=SUPER, 4, workspace, 4
bind=SUPER, 5, workspace, 5
bind=SUPER, 6, workspace, 6
bind=SUPER, 7, workspace, 7
bind=SUPER, 8, workspace, 8
bind=SUPER, 9, workspace, 9
bind=SUPER, 0, workspace, 10
bind=SUPER, N, workspace, e+1
bind=SUPER, P, workspace, e-1
bind=SUPER, bracketright, workspace, +1
bind=SUPER, bracketleft, workspace, -1
bind=SUPER SHIFT, 1, movetoworkspace, 1
bind=SUPER SHIFT, 2, movetoworkspace, 2
bind=SUPER SHIFT, 3, movetoworkspace, 3
bind=SUPER SHIFT, 4, movetoworkspace, 4
bind=SUPER SHIFT, 5, movetoworkspace, 5
bind=SUPER SHIFT, 6, movetoworkspace, 6
bind=SUPER SHIFT, 7, movetoworkspace, 7
bind=SUPER SHIFT, 8, movetoworkspace, 8
bind=SUPER SHIFT, 9, movetoworkspace, 9
bind=SUPER SHIFT, 0, movetoworkspace, 10
bind=SUPER SHIFT, N, movetoworkspace, e+1
bind=SUPER SHIFT, P, movetoworkspace, e-1
bind=SUPER SHIFT, bracketright, movetoworkspace, +1
bind=SUPER SHIFT, bracketleft, movetoworkspace, -1

bind=SUPER, tab, workspace, previous
bind=SUPER SHIFT, tab, movetoworkspace, previous
bind=ALT , tab, cyclenext,
bind=ALT SHIFT, tab, cyclenext, prev

bindel=, XF86AudioRaiseVolume, exec, t_controller volume set speaker 5%+
bindel=, XF86AudioLowerVolume, exec, t_controller volume set speaker 5%-
bindel=, XF86AudioMute, exec, t_controller volume toggle_mute speaker
bindel=, XF86AudioMicMute, exec, t_controller volume toggle_mute microphone
bindel=, XF86MonBrightnessUp, exec, t_controller brightness set 5%+
bindel=, XF86MonBrightnessDown, exec, t_controller brightness set 5%-

bindl=, XF86AudioNext, exec, t_controller player next
bindl=, XF86AudioPause, exec, t_controller player play-pause
bindl=, XF86AudioPlay, exec, t_controller player play-pause
bindl=, XF86AudioPrev, exec, t_controller player previous

bindm=SUPER SHIFT, mouse:272, movewindow
bindm=SUPER SHIFT, mouse:273, resizewindow

# bindc=Caps_Lock, Caps_Lock, exec, swayosd-client --caps-lock
# bindc=Mod2, Num_Lock, exec, swayosd-client --num-lock

# plugin: xtra-dispatcher
# hyprlang noerror true
bind=SUPER, D, plugin:xtd:throwunfocused, special:stash
bind=SUPER SHIFT, D, plugin:xtd:bringallfrom, special:stash
bind=SUPER SHIFT, C, plugin:xtd:closeunfocused,
# hyprlang noerror false
