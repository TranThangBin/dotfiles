bind=SUPER           , Return, exec, tutils terminal
bind=SUPER           , E     , exec, tutils file_explorer
bind=SUPER           , Space , exec, tutils launcher
bind=SUPER SHIFT     , E     , exec, tutils powermenu
bind=SUPER           , C     , exec, tutils color_picker --lock
bind=SUPER           , S     , exec, tutils emoji_picker
bind=SUPER           , V     , exec, tutils clipboard_picker --action pick
bind=SUPER SHIFT     , V     , exec, tutils clipboard_picker --action delete
bind=SUPER CTRL SHIFT, V     , exec, tutils clipboard_picker --action wipe
bind=SUPER           , PRINT , exec, tutils screenshot --lock --action savecopy --method area
bind=SUPER SHIFT     , PRINT , exec, tutils screenshot --lock --action savecopy --method window
bind=SUPER CTRL SHIFT, PRINT , exec, tutils screenshot --lock --action savecopy --method output
bind=                , PRINT , exec, tutils screenshot --lock --action copy --method area
bind=SHIFT           , PRINT , exec, tutils screenshot --lock --action copy --method window
bind=CTRL SHIFT      , PRINT , exec, tutils screenshot --lock --action copy --method output
bind=SUPER           , B     , exec, tutils status_bar --action toggle
bind=SUPER SHIFT     , B     , exec, tutils status_bar --action refresh

bindel= , XF86AudioRaiseVolume , exec, tutils volume --device speaker --inc-percent 5
bindel= , XF86AudioLowerVolume , exec, tutils volume --device speaker --dec-percent 5
bindel= , XF86AudioMute        , exec, tutils volume --device speaker --toggle-mute
bindel= , XF86AudioMicMute     , exec, tutils volume --device microphone --toggle-mute
bindel= , XF86MonBrightnessUp  , exec, tutils brightness --device all --class backlight --inc-percent 5
bindel= , XF86MonBrightnessDown, exec, tutils brightness --device all --class backlight --dec-percent 5

bindl= , XF86AudioNext , exec, tutils player --next
bindl= , XF86AudioPause, exec, tutils player --play-pause
bindl= , XF86AudioPlay , exec, tutils player --play-pause
bindl= , XF86AudioPrev , exec, tutils player --previous

bind=SUPER      , F, fullscreen,
bind=SUPER SHIFT, F, togglefloating,
bind=SUPER SHIFT, Q, killactive,

bind=SUPER, L, movefocus, r
bind=SUPER, H, movefocus, l
bind=SUPER, K, movefocus, u
bind=SUPER, J, movefocus, d

bind=SUPER SHIFT, L, movewindow, r
bind=SUPER SHIFT, H, movewindow, l
bind=SUPER SHIFT, K, movewindow, u
bind=SUPER SHIFT, J, movewindow, d

binde=SUPER CTRL, L, resizeactive, 10 0
binde=SUPER CTRL, H, resizeactive, -10 0
binde=SUPER CTRL, K, resizeactive, 0 -10
binde=SUPER CTRL, J, resizeactive, 0 10

bind=SUPER      , 1           , workspace      , 1
bind=SUPER      , 2           , workspace      , 2
bind=SUPER      , 3           , workspace      , 3
bind=SUPER      , 4           , workspace      , 4
bind=SUPER      , 5           , workspace      , 5
bind=SUPER      , 6           , workspace      , 6
bind=SUPER      , 7           , workspace      , 7
bind=SUPER      , 8           , workspace      , 8
bind=SUPER      , 9           , workspace      , 9
bind=SUPER      , 0           , workspace      , 10
bind=SUPER      , N           , workspace      , e+1
bind=SUPER      , P           , workspace      , e-1
bind=SUPER      , bracketright, workspace      , +1
bind=SUPER      , bracketleft , workspace      , -1
bind=SUPER SHIFT, 1           , movetoworkspace, 1
bind=SUPER SHIFT, 2           , movetoworkspace, 2
bind=SUPER SHIFT, 3           , movetoworkspace, 3
bind=SUPER SHIFT, 4           , movetoworkspace, 4
bind=SUPER SHIFT, 5           , movetoworkspace, 5
bind=SUPER SHIFT, 6           , movetoworkspace, 6
bind=SUPER SHIFT, 7           , movetoworkspace, 7
bind=SUPER SHIFT, 8           , movetoworkspace, 8
bind=SUPER SHIFT, 9           , movetoworkspace, 9
bind=SUPER SHIFT, 0           , movetoworkspace, 10
bind=SUPER SHIFT, N           , movetoworkspace, e+1
bind=SUPER SHIFT, P           , movetoworkspace, e-1
bind=SUPER SHIFT, bracketright, movetoworkspace, +1
bind=SUPER SHIFT, bracketleft , movetoworkspace, -1

bind=SUPER      , tab, workspace, previous
bind=SUPER SHIFT, tab, movetoworkspace, previous
bind=ALT        , tab, cyclenext
bind=ALT SHIFT  , tab, cyclenext, prev

bindm=SUPER SHIFT, mouse:272, movewindow
bindm=SUPER SHIFT, mouse:273, resizewindow

