$mainMod=SUPER
$terminal=uwsm-app -T

$fileExplorer=rofi -config wayland-config.rasi -show filebrowser

$launcher=rofi -config wayland-config.rasi -show
$logoutMenu=$HOME/.config/rofi/scripts/powermenu.sh
$colorPicker=flock -n /tmp/hyprpicker.lock -c hyprpicker
$emojiPicker=rofi -show emoji -emoji-mode

$clipboardPicker=cliphist list | rofi -dmenu -p "Copy Clipboard Entry" | cliphist decode | wl-copy
$clipboardDelete=cliphist list | rofi -dmenu -p "Delete Clipboard Entry" | cliphist delete
$clipboardWipe=[ "$(printf 'no\nyes' | rofi -dmenu -p 'Wipe Clipboard')" = 'yes' ] && cliphist wipe

$hyprshotLockFile=/tmp/hyprshot.lock
$hyprshotScreenshotDir=$HOME/Pictures/Screenshots
$hyprshotNotificationTimeout=5000
$screenshotRegion=flock -n $hyprshotLockFile -c "hyprshot -z -m region -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$screenshotWindow=flock -n $hyprshotLockFile -c "hyprshot -z -m window -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$screenshotOutput=flock -n $hyprshotLockFile -c "hyprshot -z -m output -t $hyprshotNotificationTimeout -o $hyprshotScreenshotDir"
$clipboardScreenshotRegion=flock -n $hyprshotLockFile -c "hyprshot -z -m region -t $hyprshotNotificationTimeout"
$clipboardScreenshotWindow=flock -n $hyprshotLockFile -c "hyprshot -z -m window -t $hyprshotNotificationTimeout"
$clipboardScreenshotOutput=flock -n $hyprshotLockFile -c "hyprshot -z -m output -t $hyprshotNotificationTimeout"

$toggleStatusBar=killall -SIGUSR1 waybar
$refreshStatusBar=killall -SIGUSR2 waybar

bind=$mainMod, Return, exec, $terminal
bind=$mainMod, E, exec, $fileExplorer
bind=$mainMod, Space, exec, $launcher
bind=$mainMod SHIFT, E, exec, $logoutMenu
bind=$mainMod, C, exec, $colorPicker
bind=$mainMod SHIFT, Space, exec, $emojiPicker
bind=$mainMod, V, exec, $clipboardPicker
bind=$mainMod SHIFT, V, exec, $clipboardDelete
bind=$mainMod CTRL SHIFT, V, execr, $clipboardWipe
bind=$mainMod, PRINT, exec, $screenshotRegion
bind=$mainMod SHIFT, PRINT, exec, $screenshotWindow
bind=$mainMod CTRL SHIFT, PRINT, exec, $screenshotOutput
bind=,PRINT, exec, $clipboardScreenshotRegion
bind=SHIFT, PRINT, exec, $clipboardScreenshotWindow
bind=CTRL SHIFT, PRINT, exec, $clipboardScreenshotOutput
bind=$mainMod, code:23, exec, $toggleStatusBar
bind=$mainMod SHIFT, code:23, exec, $refreshStatusBar
bind=$mainMod SHIFT, Q, killactive,
bind=$mainMod, F, fullscreen,
bind=$mainMod SHIFT, F, togglefloating,
bind=$mainMod, P, pseudo,
bind=$mainMod CTRL SHIFT, J, layoutmsg, togglesplit
bind=$mainMod, M, togglespecialworkspace, magic
bind=$mainMod SHIFT, M, movetoworkspace, special:magic
bind=$mainMod, L, movefocus, r
bind=$mainMod SHIFT, L, movewindow, r
bind=$mainMod, H, movefocus, l
bind=$mainMod SHIFT, H, movewindow, l
bind=$mainMod, K, movefocus, u
bind=$mainMod SHIFT, K, movewindow, u
bind=$mainMod, J, movefocus, d
bind=$mainMod SHIFT, J, movewindow, d
bind=$mainMod ALT, L, workspace, e+1
bind=$mainMod ALT SHIFT, L, movetoworkspace, e+1
bind=$mainMod ALT, H, workspace, e-1
bind=$mainMod ALT SHIFT, H, movetoworkspace, e-1

bind=$mainMod, 1, workspace, 1
bind=$mainMod SHIFT, 1, movetoworkspace, 1
bind=$mainMod, 2, workspace, 2
bind=$mainMod SHIFT, 2, movetoworkspace, 2
bind=$mainMod, 3, workspace, 3
bind=$mainMod SHIFT, 3, movetoworkspace, 3
bind=$mainMod, 4, workspace, 4
bind=$mainMod SHIFT, 4, movetoworkspace, 4
bind=$mainMod, 5, workspace, 5
bind=$mainMod SHIFT, 5, movetoworkspace, 5
bind=$mainMod, 6, workspace, 6
bind=$mainMod SHIFT, 6, movetoworkspace, 6
bind=$mainMod, 7, workspace, 7
bind=$mainMod SHIFT, 7, movetoworkspace, 7
bind=$mainMod, 8, workspace, 8
bind=$mainMod SHIFT, 8, movetoworkspace, 8
bind=$mainMod, 9, workspace, 9
bind=$mainMod SHIFT, 9, movetoworkspace, 9
bind=$mainMod, 0, workspace, 10
bind=$mainMod SHIFT, 0, movetoworkspace, 10

bindc=Caps_Lock, Caps_Lock, exec, swayosd-client --caps-lock
bindc=Mod2, Num_Lock, exec, swayosd-client --num-lock

binde=$mainMod CTRL, L, resizeactive, 10 0
binde=$mainMod CTRL, H, resizeactive, -10 0
binde=$mainMod CTRL, K, resizeactive, 0 -10
binde=$mainMod CTRL, J, resizeactive, 0 10

bindel=, XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel=, XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel=, XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel=, XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel=, XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel=, XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl=, XF86AudioNext, exec, swayosd-client --playerctl next
bindl=, XF86AudioPause, exec,swayosd-client --playerctl play-pause
bindl=, XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl=, XF86AudioPrev, exec,swayosd-client --playerctl previous

bindm=$mainMod SHIFT, mouse:272, movewindow
bindm=$mainMod SHIFT, mouse:273, resizewindow
