[trantbox-desktop]
home=$HOME/distrobox-home/trantbox-desktop
image=archlinux:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_packages=firefox helvum pavucontrol obs-studio discord fcitx5-configtool nvidia-settings
exported_apps=firefox helvum pavucontrol obs discord fcitx5-configtool nvidia-settings

[trantbox-games]
home=$HOME/distrobox-home/trantbox-games
image=archlinux:latest
entry=true
nvidia=true
replace=true
start_now=true
pre_init_hooks=mv /etc/pacman.conf /etc/pacman.conf.bak
pre_init_hooks=cp $HOME/distrobox-home/trantbox-games/pacman.conf /etc/pacman.conf
additional_packages=steam umu-launcher
exported_apps=steam

[trantbox-services]
home=$HOME/distrobox-home/trantbox-services
image=archlinux:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_packages=hyprpaper fcitx5 fcitx5-unikey waybar

[trantbox-services-init]
home=$HOME/distrobox-home/trantbox-services
image=archlinux:latest
entry=true
nvidia=true
replace=true
start_now=true
init=true
additional_packages=swayosd xdg-desktop-portal-hyprland
exported_bins=/usr/bin/swayosd-client

[trantbox-dev]
home=$HOME/distrobox-home/trantbox-dev
image=archlinux:latest
entry=true
replace=true
start_now=true
additional_packages=gcc make which neovim tmux neovide fzf ripgrep fd
exported_apps=neovide
exported_bins=/usr/bin/nvim /usr/bin/tmux
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/git
