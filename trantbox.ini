[trantbox-desktop]
home=$HOME/distrobox-home/trantbox-desktop
image=ghcr.io/ublue-os/bazzite-arch:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_flags=--env HYPRSHOT_DIR=$HOME/distrobox-home/trantbox-desktop/Pictures
additional_packages=firefox helvum obs-studio discord fcitx5-configtool nvidia-settings
additional_packages=btop yazi hyprpicker hyprshot
init_hooks=sudo -u $USER -- paru -S --noconfirm teams
init_hooks=sudo -u $USER -- paru -S --noconfirm pwvucontrol
exported_apps=firefox helvum obs discord fcitx5-configtool nvidia-settings
exported_bins=/usr/bin/btop /usr/bin/yazi /usr/bin/hyprpicker /usr/bin/hyprshot
exported_apps=teams pwvucontrol
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/hyprctl

[trantbox-games]
home=$HOME/distrobox-home/trantbox-games
image=ghcr.io/ublue-os/bazzite-arch:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_packages=steam umu-launcher
exported_apps=steam

[trantbox-services]
home=$HOME/distrobox-home/trantbox-services
image=archlinux:latest
entry=true
replace=true
start_now=true
additional_packages=hyprpaper fcitx5 fcitx5-unikey waybar cliphist wl-clipboard easyeffects
exported_apps=easyeffects
exported_bins=/usr/bin/wl-copy /usr/bin/wl-paste /usr/bin/cliphist

[trantbox-dev]
home=$HOME/distrobox-home/trantbox-dev
image=archlinux:latest
entry=true
replace=true
start_now=true
additional_packages=gcc make which neovim tmux neovide fzf ripgrep fd
exported_apps=neovide
exported_bins=/usr/bin/nvim /usr/bin/tmux
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/git
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/yay
