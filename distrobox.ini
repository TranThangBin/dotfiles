[trantbox-games]
home=$HOME/distrobox-home/trantbox-games
image=ghcr.io/ublue-os/bazzite-arch:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_packages=steam umu-launcher
init_hooks=sudo -u $USER -- paru -S --noconfirm --needed legacy-launcher
exported_apps=steam legacy-launcher

; volume=/extra/$USER/.local/share/Steam:$HOME/distrobox-home/trantbox-games/.local/share/Steam
# The line before this would error because I intend to comment it like that
# since that it is a volume for my specific computer so just add '#' before the ';'

[trantbox-desktop]
home=$HOME/distrobox-home/trantbox-desktop
image=ghcr.io/ublue-os/bazzite-arch:latest
entry=true
nvidia=true
replace=true
start_now=true
additional_packages=firefox helvum obs-studio nvidia-settings btop fcitx5-configtool
init_hooks=sudo -u $USER -- paru -S --noconfirm --needed webcord teams pwvucontrol bottles
init_hooks=sudo -u $USER -- paru -S --noconfirm --needed godot-beta-bin unityhub
init_hooks=sudo -u $USER -- paru -S --noconfirm --needed hyprsysteminfo-git hyprqt6engine-git
exported_apps=firefox helvum obs nvidia-settings btop fcitx5-configtool
exported_apps=webcord teams pwvucontrol bottles godot-beta unityhub hyprsysteminfo

[trantbox-services]
home=$HOME/distrobox-home/trantbox-services
image=archlinux:latest
entry=true
replace=true
start_now=true
additional_packages=fcitx5 fcitx5-unikey waybar brightnessctl playerctl
additional_packages=swaync profile-sync-daemon cliphist wl-clipboard wtype libnotify
additional_packages=hyprpaper hyprpicker hyprshot
additional_flags=--env HYPRSHOT_DIR=$HOME/Pictures/Screenshots
exported_bins=/usr/bin/wl-copy /usr/bin/wl-paste /usr/bin/wtype /usr/bin/notify-send
exported_bins=/usr/bin/hyprpicker /usr/bin/hyprshot /usr/bin/cliphist
volume=$HOME/distrobox-home/trantbox-desktop/.mozilla:$HOME/distrobox-home/trantbox-services/.mozilla

[trantbox-dev]
home=$HOME/distrobox-home/trantbox-dev
image=archlinux:latest
entry=true
replace=true
start_now=true
additional_packages=git gcc make which fzf ripgrep fd nodejs npm neovim neovide tmux dysk
additional_packages=stow fastfetch zoxide python3 tree-sitter-cli dotnet-host
exported_apps=neovide
exported_bins=/usr/bin/nvim /usr/bin/tmux /usr/bin/dysk /usr/bin/fzf
exported_bins=/usr/bin/stow /usr/bin/fastfetch /usr/bin/zoxide
volume=$HOME/.ssh:$HOME/distrobox-home/trantbox-dev/.ssh
volume=$HOME/.config/git:$HOME/distrobox-home/trantbox-dev/.config/git
