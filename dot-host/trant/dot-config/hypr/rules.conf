$mainMonitor=eDP-2
$hdmiMonitor=HDMI-A-1

monitor=$mainMonitor,preferred,auto,1
monitor=$hdmiMonitor,preferred,auto,1

windowrulev2=suppressevent maximize, class:.*
windowrulev2=prop nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

workspace=1,  monitor:$mainMonitor, default:true
workspace=2,  monitor:$mainMonitor, default:true
workspace=3,  monitor:$mainMonitor, default:true
workspace=4,  monitor:$mainMonitor, default:true
workspace=5,  monitor:$mainMonitor, default:true
workspace=6,  monitor:$hdmiMonitor, default:true
workspace=7,  monitor:$hdmiMonitor, default:true
workspace=8,  monitor:$hdmiMonitor, default:true
workspace=9,  monitor:$hdmiMonitor, default:true
workspace=10, monitor:$hdmiMonitor, default:true
