[trantbox-desktop]
home=$HOME/.local/share/distrobox/home/trantbox-desktop
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# dependencies
additional_packages=libnotify wl-clipboard
# host integration
volume=$HOME/.dotfiles/dot-host/trant/.config/fish:$HOME/.local/share/distrobox/home/trantbox-desktop/.config/fish:ro
# main
additional_packages=firefox helvum obs-studio nvidia-settings btop gimp shotcut discord
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm webcord-bin brave-bin tor-browser-bin teams
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm pwvucontrol hyprsysteminfo bottles
; init_hooks=[ -d $HOME/.local/share/distrobox/home/trantbox-desktop/.mozilla/firefox/trant.default-release ] || mkdir -p $HOME/.local/share/distrobox/home/trantbox-desktop/.mozilla/firefox/trant.default-release
; init_hooks=cp $HOME/.dotfiles/dot-distrobox/trantbox-desktop/.mozilla/firefox/trant.default-release/user.js $HOME/.local/share/distrobox/home/trantbox-desktop/.mozilla/firefox/trant.default-release/user.js
exported_apps=firefox helvum obs nvidia-settings btop gimp shotcut discord
exported_apps=webcord brave tor-browser teams pwvucontrol hyprsysteminfo bottles
volume=$HOME/.dotfiles/dot-distrobox/trantbox-desktop/.config/WebCord/Themes:$HOME/.local/share/distrobox/home/trantbox-desktop/.config/WebCord/Themes:ro
volume=$HOME/.dotfiles/dot-distrobox/trantbox-desktop/.config/btop:$HOME/.local/share/distrobox/home/trantbox-desktop/.config/btop:ro
volume=$HOME/.dotfiles/dot-distrobox/trantbox-desktop/.mozilla/firefox/profiles.ini:$HOME/.local/share/distrobox/home/trantbox-desktop/.mozilla/firefox/profiles.ini:ro

init_hooks=touch /etc/init

[trantbox-games]
home=$HOME/.local/share/distrobox/home/trantbox-games
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# dependencies
additional_packages=openal pipewire pipewire-pulse pipewire-alsa pipewire-jack wireplumber
# host integration
volume=$HOME/.dotfiles/dot-host/trant/.config/fish:$HOME/.local/share/distrobox/home/trantbox-games/.config/fish:ro
;    volume=/extra/$USER/.local/share/Steam:$HOME/.local/share/distrobox/home/trantbox-games/.local/share/Steam:rw
;    volume=/extra/$USER/Games:$HOME/.local/share/distrobox/home/trantbox-games/Games:rw
# main
additional_packages=steam umu-launcher
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm legacy-launcher
exported_apps=steam legacy-launcher
volume=$HOME/.dotfiles/dot-distrobox/trantbox-games/.local/share/Steam/steam_dev.cfg:$HOME/.local/share/distrobox/home/trantbox-games/.local/share/Steam/steam_dev.cfg:ro

init_hooks=touch /etc/init

[trantbox-dev]
home=$HOME/.local/share/distrobox/home/trantbox-dev
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
nvidia=true
start_now=true

# host integration
volume=$HOME/.dotfiles/dot-host/trant/.config/fish:$HOME/.local/share/distrobox/home/trantbox-dev/.config/fish:ro
;    volume=/extra/$USER/Unity:$HOME/.local/share/distrobox/home/trantbox-dev/Unity:rw
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/stow
# essential
additional_packages=wl-clipboard
# general
additional_packages=gcc make which git fzf nodejs npm neovim neovide zellij
additional_packages=python3 tree-sitter-cli dotnet-sdk luarocks
exported_apps=neovide
exported_bins=/usr/bin/nvim /usr/bin/zellij /usr/bin/fzf
volume=$HOME/.dotfiles/dot-distrobox/trantbox-dev/.config/nvim:$HOME/.local/share/distrobox/home/trantbox-dev/.config/nvim:rw
volume=$HOME/.dotfiles/dot-distrobox/trantbox-dev/.config/zellij:$HOME/.local/share/distrobox/home/trantbox-dev/.config/zellij:rw
volume=$HOME/.ssh:$HOME/.local/share/distrobox/home/trantbox-dev/.ssh:ro
volume=$HOME/.config/git:$HOME/.local/share/distrobox/home/trantbox-dev/.config/git:ro
# gamedev
init_hooks=[ -f /etc/init ] || sudo -u $USER -- paru -S --needed --noconfirm godot-beta-bin unityhub rider
init_hooks=[ -d $HOME/.local/share/distrobox/home/trantbox-dev/.local/share/unity3d ] || mkdir -p $HOME/.local/share/distrobox/home/trantbox-dev/.local/share/unity3d
exported_apps=godot-beta unityhub rider
volume=$HOME/.dotfiles/dot-distrobox/trantbox-dev/.local/share/unity3d/.gitkeep:$HOME/.local/share/distrobox/home/trantbox-dev/.local/share/unity3d/.gitkeep

init_hooks=touch /etc/init

[trantbox-services]
home=$HOME/.local/share/distrobox/home/trantbox-services
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
start_now=true

# host integration
volume=$HOME/.dotfiles/dot-host/trant/.config/fish:$HOME/.local/share/distrobox/home/trantbox-desktop/.config/fish:ro
# general
additional_packages=profile-sync-daemon fcitx5 fcitx5-unikey fcitx5-configtool playerctl
init_hooks=cp /usr/share/psd/contrib/brave /usr/share/psd/browsers/brave
exported_apps=fcitx5-configtool
exported_bins=/usr/bin/fcitx5 /usr/bin/playerctld
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.local/share/fcitx5/themes:$HOME/.local/share/distrobox/home/trantbox-services/.local/share/fcitx5/themes:ro
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/fcitx5:$HOME/.local/share/distrobox/home/trantbox-services/.config/fcitx5:rw
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/psd:$HOME/.local/share/distrobox/home/trantbox-services/.config/psd:ro
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/waybar:$HOME/.local/share/distrobox/home/trantbox-services/.config/waybar:ro
volume=$HOME/.local/share/distrobox/home/trantbox-desktop/.mozilla:$HOME/.local/share/distrobox/home/trantbox-services/.mozilla:rw
volume=$HOME/.local/share/distrobox/home/trantbox-desktop/.config/BraveSoftware:$HOME/.local/share/distrobox/home/trantbox-services/.config/BraveSoftware:rw
# wayland
additional_packages=swaync waybar cliphist wl-clipboard
exported_bins=/usr/bin/wl-copy /usr/bin/wl-paste /usr/bin/cliphist
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/swaync:$HOME/.local/share/distrobox/home/trantbox-services/.config/swaync:ro
# hyprland
additional_packages=hyprpaper hyprsunset
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/hypr:$HOME/.local/share/distrobox/home/trantbox-services/.config/hypr:ro
# X11
additional_packages=picom feh
exported_bins=/usr/bin/picom /usr/bin/feh
volume=$HOME/.dotfiles/dot-distrobox/trantbox-services/.config/picom:$HOME/.local/share/distrobox/home/trantbox-services/.config/picom:ro

[trantbox-utils]
home=$HOME/.local/share/distrobox/home/trantbox-utils
image=ghcr.io/ublue-os/arch-toolbox:latest
entry=true
start_now=true

# host integration
volume=$HOME/.dotfiles/dot-host/trant/.config/fish:$HOME/.local/share/distrobox/home/trantbox-utils/.config/fish:ro
# essential
additional_packages=ripgrep fd fastfetch zoxide brightnessctl catimg unzip bat libnotify unrar
exported_bins=/usr/bin/rg /usr/bin/fd /usr/bin/fastfetch /usr/bin/zoxide
exported_bins=/usr/bin/catimg /usr/bin/unzip /usr/bin/notify-send /usr/bin/unrar /usr/bin/wtype /usr/bin/bat
volume=$HOME/.dotfiles/dot-distrobox/trantbox-utils/.config/fastfetch:$HOME/.local/share/distrobox/home/trantbox-utils/.config/fastfetch:ro
# wayland
additional_packages=wtype
# hyprland
additional_packages=hyprshot hyprpicker
exported_bins=/usr/bin/hyprshot /usr/bin/hyprpicker
